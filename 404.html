<!DOCTYPE html>
<html lang="da" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404 - Siden blev ikke fundet | Schier Rengøring</title>
  <meta
    name="description"
    content="Siden blev ikke fundet. Gå tilbage til forsiden hos Schier Rengøring."
  />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Favicons -->
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />

  <style>
    .error-404 {
      min-height: calc(100vh - 220px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      padding: 4rem 0;
    }

    .error-404__box {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
      padding: 2rem 1rem;
    }

    .error-404__code {
      font-size: clamp(3rem, 10vw, 5rem);
      line-height: 1;
      font-weight: 600;
      color: #0E3195;
      margin-bottom: 1rem;
    }

    .error-404 h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      margin-bottom: 1rem;
      color: #333;
    }

    .error-404 p {
      max-width: 560px;
      margin: 0 auto 1.5rem;
      color: #555;
      font-size: 1rem;
    }

    .error-404__btn {
      display: inline-block;
      background: #208738;
      color: #fff;
      padding: 0.8rem 1.25rem;
      border-radius: 6px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .error-404__btn:hover,
    .error-404__btn:focus-visible {
      background: #1e7e34;
      color: #fff;
    }
  </style>
</head>

<body>
  <a class="skip-link" href="#main">Spring til indhold</a>

  <header class="site-header">
    <div class="container">
      <a href="https://www.schier.dk/" class="logo-link" aria-label="Gå til forsiden">
        <picture>
          <source type="image/svg+xml" srcset="images/schier-professionel-rengoring-logo.svg">
          <img
            src="images/schier-professionel-rengoring-logo.jpg"
            alt="Schier Rengøring Logo"
            class="logo"
            width="1200"
            height="300"
          />
        </picture>
      </a>
    </div>
  </header>

  <main id="main" class="site-content">
    <section class="error-404">
      <div class="container">
        <div class="error-404__box">
          <div class="error-404__code">404</div>
          <h1>Siden blev ikke fundet</h1>
          <p>
            Ups - noget gik galt! 
            Gå tilbage til forsiden og find det, du leder efter derfra.
          </p>
          <a href="https://www.schier.dk/" class="error-404__btn">Gå til forsiden</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        Schier Rengøring · Folemarken 59, 4800 Nykøbing F |
        <a href="tel:+4550507665">50 50 76 65</a> |
        <a id="email-link" href="#"></a> | CVR-nr. 38199633
      </p>
    </div>
  </footer>

  <script>
    (function () {
      const user = "my";
      const domain = "schier";
      const tld = "dk";
  
      const link = document.getElementById("email-link");
      if (!link) return;
  
      const email = `${user}@${domain}.${tld}`;
      link.href = `mailto:${email}`;
      link.textContent = email;
    })();
  </script>
  
</body>
</html>
